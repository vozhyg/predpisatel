<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Предписатель</title>
    <style>
      :root {
        --bg: #020405;
        --cyan: #4facff;
        --cyan-soft: rgba(79, 172, 255, 0.44);
        --cyan-dim: rgba(79, 172, 255, 0.18);
        --display-font: "Bahnschrift", "DIN Condensed", "Roboto Condensed", "Arial Narrow", "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #000;
      }

      body {
        position: fixed;
        inset: 0;
        margin: 0;
        background:
          radial-gradient(circle at 50% 28%, rgba(79, 172, 255, 0.12), transparent 38%),
          linear-gradient(180deg, #07090a 0%, var(--bg) 48%, #000 100%);
        color: var(--cyan);
        font-family: var(--display-font);
        overflow: hidden;
        touch-action: none;
      }

      .app {
        width: min(100vw, 430px);
        height: 100dvh;
        min-height: 100svh;
        margin: 0 auto;
        padding: max(22px, env(safe-area-inset-top)) 12px max(22px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-rows: 1fr auto;
        align-items: center;
        gap: 26px;
        position: relative;
        overflow: visible;
        touch-action: none;
      }

      .app::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, #000 20%, transparent 72%);
      }

      .pager {
        width: min(92vw, 410px);
        margin: auto;
        position: relative;
        filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.7));
        transform: rotate(-4deg);
        animation: deviceIdle 4.8s ease-in-out infinite;
      }

      .pager__top {
        position: absolute;
        z-index: 5;
        top: 15px;
        left: 52px;
        right: 90px;
        height: 23px;
        background:
          linear-gradient(95deg, transparent 0 23%, rgba(255, 255, 255, 0.18) 23% 25%, transparent 25%),
          linear-gradient(160deg, #746e61, #4e493f);
        border: 3px solid rgba(8, 9, 8, 0.76);
        clip-path: polygon(5% 0, 98% 0, 91% 100%, 0 100%);
        opacity: 0.86;
        pointer-events: none;
      }

      .pager__top span {
        position: absolute;
        top: 4px;
        width: 48px;
        height: 14px;
        background: #6b6558;
        border: 2px solid rgba(8, 9, 8, 0.55);
        clip-path: polygon(12% 0, 100% 0, 82% 100%, 0 100%);
      }

      .pager__top span:nth-child(1) {
        left: -47px;
      }

      .pager__top span:nth-child(2),
      .pager__top span:nth-child(3) {
        display: none;
      }

      .pager__body {
        position: relative;
        z-index: 2;
        min-height: 214px;
        padding: 31px 52px 23px 17px;
        background:
          radial-gradient(circle at 20% 18%, rgba(20, 18, 15, 0.38) 0 1px, transparent 2px),
          radial-gradient(circle at 58% 22%, rgba(20, 18, 15, 0.32) 0 1px, transparent 2px),
          radial-gradient(circle at 76% 70%, rgba(20, 18, 15, 0.34) 0 1px, transparent 2px),
          radial-gradient(circle at 31% 84%, rgba(20, 18, 15, 0.32) 0 1px, transparent 2px),
          repeating-linear-gradient(103deg, rgba(0, 0, 0, 0.08) 0 1px, transparent 1px 18px),
          linear-gradient(170deg, rgba(255, 255, 255, 0.42) 0 8%, transparent 9% 54%, rgba(0, 0, 0, 0.22) 55%),
          linear-gradient(145deg, #d2c9b7 0%, #b8ad98 30%, #aaa18e 54%, #776f62 100%);
        border: 7px solid #050607;
        clip-path: polygon(7% 0, 93% 0, 100% 10%, 100% 90%, 93% 100%, 7% 100%, 0 90%, 0 10%);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.34),
          inset 0 -8px 0 rgba(0, 0, 0, 0.2),
          0 7px 0 #1b1a17;
      }

      .pager__body::before,
      .pager__body::after {
        content: "";
        position: absolute;
        pointer-events: none;
        z-index: 1;
      }

      .pager__body::before {
        inset: 12px 14px;
        clip-path: polygon(6% 0, 93% 0, 100% 10%, 100% 90%, 93% 100%, 7% 100%, 0 90%, 0 10%);
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.24);
      }

      .pager__body::after {
        left: 28px;
        right: 59px;
        bottom: 12px;
        width: auto;
        height: 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 45%),
          #7d7567;
        border: 3px solid rgba(8, 9, 8, 0.65);
        clip-path: polygon(0 0, 100% 0, 94% 100%, 3% 100%);
        opacity: 0.76;
      }

      .pager__antenna {
        display: none;
      }

      .pager__bevel {
        position: relative;
        z-index: 4;
        padding: 8px 9px;
        background:
          linear-gradient(135deg, #151714 0 7%, #d2c9b7 7% 13%, #161816 13% 18%, #9f9582 18% 100%);
        border: 4px solid #080a0a;
        box-shadow:
          inset 0 0 0 2px rgba(0, 0, 0, 0.48),
          0 7px 0 rgba(0, 0, 0, 0.34);
      }

      .screen {
        height: clamp(142px, 36vw, 172px);
        padding: 12px 13px 11px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(79, 172, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #010909 0%, #020303 100%);
        border: 3px solid #111;
        box-shadow:
          inset 0 0 0 2px rgba(79, 172, 255, 0.1),
          inset 0 0 28px rgba(79, 172, 255, 0.2),
          0 0 24px rgba(79, 172, 255, 0.24);
      }

      .screen__noise,
      .screen__scanlines {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen__noise {
        opacity: 0.14;
        background-image:
          radial-gradient(circle at 12% 24%, #fff 0 1px, transparent 1px),
          radial-gradient(circle at 62% 72%, #fff 0 1px, transparent 1px),
          radial-gradient(circle at 82% 18%, #fff 0 1px, transparent 1px);
        background-size: 31px 29px, 43px 37px, 53px 47px;
        animation: jitter 650ms steps(2) infinite;
      }

      .screen__scanlines {
        background: repeating-linear-gradient(
          180deg,
          rgba(79, 172, 255, 0.06) 0,
          rgba(79, 172, 255, 0.06) 1px,
          transparent 1px,
          transparent 5px
        );
      }

      .screen__label {
        margin: 0;
        padding-bottom: 4px;
        border-bottom: 1px solid rgba(79, 172, 255, 0.58);
        color: rgba(79, 172, 255, 0.62);
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.12;
        text-shadow: 0 0 8px var(--cyan-soft);
        box-shadow: 0 1px 0 rgba(79, 172, 255, 0.12);
      }

      .screen__text {
        height: calc(100% - 17px);
        color: var(--cyan);
        font-size: clamp(0.82rem, 3.42vw, 0.96rem);
        font-weight: 800;
        letter-spacing: 0.025em;
        line-height: 1.26;
        overflow-x: hidden;
        overflow-y: auto;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        text-transform: uppercase;
        font-variant-numeric: lining-nums tabular-nums;
        font-feature-settings: "lnum" 1, "tnum" 1;
        text-shadow:
          0 0 5px rgba(79, 172, 255, 0.95),
          0 0 16px var(--cyan-soft);
        scrollbar-width: none;
        -ms-overflow-style: none;
        overscroll-behavior: contain;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
      }

      .screen__text::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      .screen__text.is-waiting {
        animation: blinkText 1.15s steps(2) infinite;
      }

      .screen__text.is-error {
        color: #ff3030;
        text-shadow:
          0 0 5px rgba(255, 48, 48, 0.95),
          0 0 18px rgba(255, 48, 48, 0.52);
      }

      .cursor {
        display: inline-block;
        width: 0.74em;
        height: 1em;
        margin-left: 3px;
        vertical-align: -0.13em;
        background: var(--cyan);
        box-shadow: 0 0 12px var(--cyan);
        animation: blinkCursor 740ms steps(2) infinite;
      }

      .screen__text.is-error .cursor {
        background: #ff3030;
        box-shadow: 0 0 12px rgba(255, 48, 48, 0.92);
      }

      .boot-flower {
        position: absolute;
        left: 50%;
        top: 74%;
        width: 68px;
        height: 68px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: opacity 180ms ease;
        filter:
          drop-shadow(0 0 8px rgba(79, 172, 255, 0.95))
          drop-shadow(0 0 22px rgba(79, 172, 255, 0.58))
          drop-shadow(0 0 38px rgba(5, 90, 255, 0.38));
      }

      .boot-flower.is-visible {
        opacity: 1;
      }

      .boot-flower:not(.is-visible) .boot-flower__petal {
        animation: none;
        opacity: 0;
      }

      .boot-flower__petal {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 21px;
        height: 31px;
        background: var(--cyan);
        border: 0;
        border-radius: 82% 82% 58% 58% / 92% 92% 42% 42%;
        box-shadow: none;
        clip-path: polygon(
          50% 0,
          64% 7%,
          78% 20%,
          91% 42%,
          96% 64%,
          88% 82%,
          74% 95%,
          66% 100%,
          58% 96%,
          50% 70%,
          42% 96%,
          34% 100%,
          26% 95%,
          12% 82%,
          4% 64%,
          9% 42%,
          22% 20%,
          36% 7%
        );
        opacity: 0;
        transform-origin: 50% 125%;
      }

      .boot-flower__petal:nth-child(1) {
        transform: translate(-50%, -126%) rotate(0deg);
        animation: petalOne 6s steps(1) infinite;
      }

      .boot-flower__petal:nth-child(2) {
        transform: translate(-50%, -126%) rotate(72deg);
        animation: petalTwo 6s steps(1) infinite;
      }

      .boot-flower__petal:nth-child(3) {
        transform: translate(-50%, -126%) rotate(144deg);
        animation: petalThree 6s steps(1) infinite;
      }

      .boot-flower__petal:nth-child(4) {
        transform: translate(-50%, -126%) rotate(216deg);
        animation: petalFour 6s steps(1) infinite;
      }

      .boot-flower__petal:nth-child(5) {
        transform: translate(-50%, -126%) rotate(288deg);
        animation: petalFive 6s steps(1) infinite;
      }

      .pager__module {
        position: absolute;
        z-index: 6;
        right: 8px;
        bottom: 13px;
        width: 48px;
        height: 49px;
        display: block;
        overflow: hidden;
        background:
          repeating-linear-gradient(106deg, transparent 0 10px, rgba(255, 255, 255, 0.08) 10px 12px, transparent 12px 18px),
          radial-gradient(circle at 80% 44%, rgba(83, 88, 77, 0.24) 0 10px, transparent 19px),
          linear-gradient(145deg, #23261f 0%, #121411 58%, #070807 100%);
        border: 5px solid #050607;
        clip-path: polygon(11% 0, 96% 0, 100% 16%, 100% 80%, 89% 100%, 12% 100%, 0 87%, 0 18%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          inset -5px -6px 0 rgba(0, 0, 0, 0.25);
      }

      .slot {
        position: absolute;
        bottom: 18px;
        width: 4px;
        height: 11px;
        background: #c68726;
        transform: skewX(-18deg);
        box-shadow: 0 0 6px rgba(198, 135, 38, 0.38);
      }

      .slot:nth-child(1) {
        left: 21px;
      }

      .slot:nth-child(2) {
        left: 27px;
      }

      .slot:nth-child(3) {
        left: 33px;
      }

      .dot {
        position: absolute;
        left: 50%;
        top: 67px;
        width: 6px;
        height: 6px;
        margin: 0;
        border-radius: 50%;
        background: #050607;
        transform: translateX(-50%);
      }

      .dot.is-lit {
        background: var(--cyan);
        box-shadow:
          0 0 5px rgba(79, 172, 255, 0.92),
          0 0 11px rgba(79, 172, 255, 0.4);
      }

      .pager__right-dock {
        position: absolute;
        z-index: 5;
        top: 39px;
        right: 10px;
        bottom: 28px;
        width: 43px;
        background:
          radial-gradient(circle at 52% 72%, rgba(26, 23, 18, 0.34) 0 11px, transparent 20px),
          repeating-linear-gradient(91deg, rgba(0, 0, 0, 0.07) 0 1px, transparent 1px 15px),
          linear-gradient(160deg, #cfc5ad 0%, #afa48f 48%, #7d7568 100%);
        border: 5px solid rgba(8, 9, 8, 0.9);
        clip-path: polygon(12% 0, 100% 0, 100% 82%, 88% 100%, 12% 100%, 0 88%, 0 12%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          inset -8px 0 0 rgba(0, 0, 0, 0.18);
        pointer-events: none;
      }

      .pager__right-dock::before {
        content: "";
        position: absolute;
        left: 9px;
        right: 7px;
        top: 19px;
        height: 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 42%),
          rgba(88, 85, 74, 0.42);
        border: 2px solid rgba(42, 43, 37, 0.72);
        border-radius: 4px;
        box-shadow:
          inset 0 2px 3px rgba(0, 0, 0, 0.24),
          inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      }

      .pager__right-dock::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 27px;
        width: 15px;
        height: 18px;
        background:
          repeating-linear-gradient(
            0deg,
            #35362e 0 2px,
            transparent 2px 7px
          );
        transform: translateX(-50%);
      }

      .pager__right-frame {
        position: absolute;
        z-index: 12;
        top: 39px;
        right: 10px;
        bottom: 28px;
        width: 43px;
        border: 5px solid rgba(8, 9, 8, 0.98);
        clip-path: polygon(12% 0, 100% 0, 100% 82%, 88% 100%, 12% 100%, 0 88%, 0 12%);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.4),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        pointer-events: none;
      }

      .pager__right-frame::before,
      .pager__right-frame::after {
        content: "";
        position: absolute;
        z-index: 2;
        background: rgba(8, 9, 8, 0.98);
      }

      .pager__right-frame::before {
        top: -1px;
        left: 5px;
        right: 0;
        height: 6px;
      }

      .pager__right-frame::after {
        top: 11px;
        left: -1px;
        bottom: 12px;
        width: 6px;
        border-radius: 999px;
      }

      .pager__right-corner {
        position: absolute;
        z-index: 14;
        top: 38px;
        right: 50px;
        width: 13px;
        height: 62px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 52%),
          linear-gradient(180deg, #aba48f, #918a79);
        pointer-events: none;
      }

      .pager__right-corner::before {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        width: 6px;
        height: 62px;
        background: rgba(8, 9, 8, 0.98);
        border-radius: 999px;
      }

      .pager__right-corner::after {
        content: "";
        position: absolute;
        left: 7px;
        right: -50px;
        top: 0;
        height: 6px;
        background: rgba(8, 9, 8, 0.98);
      }

      .pager__scratch {
        position: absolute;
        z-index: 3;
        display: block;
        height: 3px;
        border-radius: 999px;
        background: rgba(15, 16, 15, 0.5);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.28);
        pointer-events: none;
        transform: rotate(-18deg);
      }

      .pager__scratch--one {
        top: 28px;
        left: 36px;
        width: 62px;
      }

      .pager__scratch--two {
        top: 49px;
        right: 46px;
        width: 46px;
        transform: rotate(13deg);
      }

      .pager__scratch--three {
        left: 24px;
        bottom: 31px;
        width: 54px;
        opacity: 0.68;
        transform: rotate(18deg);
      }

      .pager__chip {
        display: none;
        position: absolute;
        z-index: 3;
        width: 23px;
        height: 15px;
        background: #080909;
        clip-path: polygon(0 0, 100% 12%, 62% 100%, 12% 76%);
        pointer-events: none;
      }

      .pager__chip--left {
        left: 3px;
        bottom: 38px;
      }

      .pager__chip--right {
        top: 24px;
        right: 7px;
        transform: rotate(9deg);
      }

      .request-button {
        width: min(76vw, 330px);
        min-height: 58px;
        margin: 0 auto;
        padding: 0 22px;
        border: 2px solid var(--cyan);
        border-radius: 4px;
        background:
          linear-gradient(180deg, rgba(79, 172, 255, 0.14), rgba(79, 172, 255, 0.04)),
          #020606;
        color: var(--cyan);
        font: 800 0.95rem/1.1 var(--display-font);
        font-variant-numeric: lining-nums tabular-nums;
        font-feature-settings: "lnum" 1, "tnum" 1;
        letter-spacing: 0.03em;
        box-shadow:
          inset 0 0 18px var(--cyan-dim),
          0 0 20px rgba(79, 172, 255, 0.24);
        text-shadow: 0 0 10px var(--cyan-soft);
        touch-action: manipulation;
      }

      .request-button:active {
        transform: translateY(1px);
        box-shadow:
          inset 0 0 24px rgba(79, 172, 255, 0.3),
          0 0 10px rgba(79, 172, 255, 0.2);
      }

      .request-button:disabled {
        opacity: 0.48;
      }

      @keyframes blinkText {
        0%,
        42% {
          opacity: 1;
        }
        43%,
        100% {
          opacity: 0.24;
        }
      }

      @keyframes blinkCursor {
        0%,
        48% {
          opacity: 1;
        }
        49%,
        100% {
          opacity: 0;
        }
      }

      @keyframes jitter {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(-3px, 2px);
        }
      }

      @keyframes deviceIdle {
        0%,
        100% {
          transform: rotate(-4deg) translateY(0);
        }
        50% {
          transform: rotate(-3.2deg) translateY(-5px);
        }
      }

      @keyframes petalOne {
        0% {
          opacity: 0;
        }
        0.1%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes petalTwo {
        0%,
        13.2% {
          opacity: 0;
        }
        13.3%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes petalThree {
        0%,
        26.5% {
          opacity: 0;
        }
        26.6%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes petalFour {
        0%,
        39.8% {
          opacity: 0;
        }
        39.9%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes petalFive {
        0%,
        53.1% {
          opacity: 0;
        }
        53.2%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @media (max-height: 660px) {
        .app {
          gap: 16px;
          padding-top: 14px;
          padding-bottom: 14px;
        }

        .pager {
          width: min(96vw, 360px);
        }

        .screen {
          height: 138px;
        }

        .screen__text {
          height: calc(100% - 17px);
          font-size: 0.82rem;
        }

        .request-button {
          min-height: 52px;
        }
      }

      @media (max-width: 520px) {
        .pager {
          left: -18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="Фантастический пейджер предписаний">
      <section class="pager" aria-label="Экран пейджера">
        <div class="pager__top">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="pager__antenna"></div>
        <div class="pager__body">
          <span class="pager__scratch pager__scratch--one"></span>
          <span class="pager__scratch pager__scratch--two"></span>
          <span class="pager__scratch pager__scratch--three"></span>
          <span class="pager__chip pager__chip--left"></span>
          <span class="pager__chip pager__chip--right"></span>
          <div class="pager__right-dock" aria-hidden="true">
            <span class="dot is-lit"></span>
          </div>
          <div class="pager__module" aria-hidden="true">
            <span class="slot"></span>
            <span class="slot"></span>
            <span class="slot"></span>
          </div>
          <span class="pager__right-frame" aria-hidden="true"></span>
          <span class="pager__right-corner" aria-hidden="true"></span>
          <div class="pager__bevel">
            <div class="screen">
              <div class="screen__noise"></div>
              <div class="screen__scanlines"></div>
              <p class="screen__label" id="label"></p>
              <div class="screen__text" id="message" aria-live="polite"></div>
              <div class="boot-flower" id="bootFlower" aria-hidden="true">
                <span class="boot-flower__petal"></span>
                <span class="boot-flower__petal"></span>
                <span class="boot-flower__petal"></span>
                <span class="boot-flower__petal"></span>
                <span class="boot-flower__petal"></span>
              </div>
            </div>
          </div>
        </div>

      </section>

      <button class="request-button" id="requestButton" type="button">
        ПОЛУЧИТЬ ПРЕДПИСАНИЕ
      </button>
    </main>

    <script>
      const prescriptions = [
        "Обратитесь на инфостенд и поинтересуйтесь где находится инфостенд.",
        "Сделайте вид, что вы уже получили указание, и ожидайте уточнений.",
        "Найдите ближайший свободный угол и временно считайте его пунктом согласования.",
        "Сообщите ответственному лицу, что ответственное лицо пока не назначено.",
        "Подойдите к двери, убедитесь, что она существует, и вернитесь обратно.",
        "Запомните это предписание и забудьте его после следующего сигнала.",
        "Встаньте в очередь, даже если очередь отсутствует.",
        "Проверьте наличие таблички. При отсутствии таблички действуйте согласно табличке.",
        "Сохраняйте спокойствие до поступления причин для беспокойства.",
        "Передайте устное подтверждение самому себе.",
        "Получите номер окна у окна, которое выдает номера окон.",
        "Ожидайте повторного ожидания до завершения текущего ожидания.",
        "Попроси у случайного косплеера селфи, а потом просто стой десять секунд и молча уйди.",
        "Минуту медленно драматично хлопай перед сценой.",
        "Встань по стойке смирно и зачитай безэмоционально пару строк первой же песни что пришла в голову.",
        "Спроси на инфостенде «где находится инфостенд?»",
        "Обними первого встречного незнакомца.",
        "Найди человека без косплея и скажи, что у него хороший косплей.",
        "Расскажи о нашем стенде незнакомцу напуганным голосом.",
        "Позвони случайному человеку и спроси «где ты?»",
        "Найди стенд с фандомом, которого не будет на Юниконе.",
      ];

      const message = document.querySelector("#message");
      const label = document.querySelector("#label");
      const button = document.querySelector("#requestButton");
      const bootFlower = document.querySelector("#bootFlower");

      let lastIndex = -1;
      let prescriptionCount = 0;
      let typingTimer = null;
      let audioContext = null;

      button.disabled = true;

      document.addEventListener(
        "touchmove",
        (event) => {
          const scrollableText = event.target.closest?.(".screen__text");

          if (!scrollableText || scrollableText.scrollHeight <= scrollableText.clientHeight) {
            event.preventDefault();
          }
        },
        { passive: false },
      );

      button.addEventListener("click", () => {
        const prescription = getRandomPrescription();
        const number = String(Math.floor(Math.random() * 900) + 100).padStart(3, "0");
        prescriptionCount += 1;
        const shouldGlitch = prescriptionCount === 3;

        playDoubleBeep(shouldGlitch ? "low" : "normal");

        typeMessage(number, prescription, shouldGlitch);
      });

      runBootSequence();

      function runBootSequence() {
        const bootLabel = "ОТДЕЛ ПРЕДПИСАНИЙ / КАНАЛ 7";
        const connectingText = "УСТАНОВКА СОЕДИНЕНИЯ";
        const connectedText = "СОЕДИНЕНИЕ УСТАНОВЛЕНО\n\nОЖИДАЙТЕ ПРЕДПИСАНИЯ...";

        label.textContent = "";
        message.classList.remove("is-waiting", "is-error");
        renderMessage("", { showCursor: false });

        typePlainText({
          target: label,
          text: bootLabel,
          afterTyping: () => {
            typingTimer = window.setTimeout(() => {
              typePlainText({
                target: message,
                text: connectingText,
                afterTyping: () => {
                  typingTimer = window.setTimeout(() => {
                    bootFlower.classList.remove("is-visible");
                    void bootFlower.offsetWidth;
                    bootFlower.classList.add("is-visible");

                    typingTimer = window.setTimeout(() => {
                      bootFlower.classList.remove("is-visible");
                      message.classList.remove("is-waiting");
                      typeText({
                        prefix: "",
                        text: connectedText,
                          tickTone: "silent",
                          afterTyping: () => {
                          renderMessage(connectedText, { showCursor: false });
                          message.classList.add("is-waiting");
                          button.disabled = false;
                        },
                      });
                    }, 6000);
                  }, 1000);
                },
              });
            }, 1000);
          },
        });
      }

      function getRandomPrescription() {
        let index = Math.floor(Math.random() * prescriptions.length);

        if (prescriptions.length > 1) {
          while (index === lastIndex) {
            index = Math.floor(Math.random() * prescriptions.length);
          }
        }

        lastIndex = index;
        return prescriptions[index];
      }

      function typeMessage(number, prescription, shouldGlitch = false) {
        window.clearTimeout(typingTimer);
        button.disabled = true;
        label.textContent = "ВХОДЯЩИЙ СИГНАЛ / ПРОТОКОЛ П-03";
        message.classList.remove("is-waiting");
        message.classList.remove("is-error");
        renderMessage(`ПРЕДПИСАНИЕ № ${number}\n\n`);

        const preparedHeader = wrapTextForScreen(message.textContent);
        const preparedPrescription = wrapTextForScreen(prescription);

        if (shouldGlitch) {
          runGlitchIntro(preparedHeader, preparedPrescription);
          return;
        }

        typingTimer = window.setTimeout(() => {
          typePreparedPrescription(preparedHeader, preparedPrescription);
        }, 1000);
      }

      function runGlitchIntro(preparedHeader, preparedPrescription) {
        const errorHeader = wrapTextForScreen("ПРЕДПИСАНИЕ № ERR ▓Ж-7Ф\n\n");
        const errorText = wrapTextForScreen("НЕМЕДЛЕННО УНИЧТОЖЬ...");

        message.classList.add("is-error");
        renderMessage(errorHeader);

        typingTimer = window.setTimeout(() => {
          typeText({
            prefix: errorHeader,
            text: errorText,
            tickTone: "low",
            afterTyping: () => {
              typingTimer = window.setTimeout(() => {
                eraseText({
                  prefix: errorHeader,
                  text: errorText,
                  afterErasing: () => {
                  message.classList.remove("is-error");
                  renderMessage(preparedHeader);
                  typePreparedPrescription(preparedHeader, preparedPrescription);
                  },
                });
              }, 500);
            },
          });
        }, 1000);
      }

      function typePreparedPrescription(preparedHeader, preparedPrescription) {
        typeText({
          prefix: preparedHeader,
          text: preparedPrescription,
          tickTone: "normal",
          afterTyping: () => {
            button.disabled = false;
          },
        });
      }

      function typeText({ prefix, text, tickTone, afterTyping }) {
        let index = 1;

        const tick = () => {
          const nextText = text.slice(0, index);
          const currentChar = text[index - 1];

          renderMessage(`${prefix}${nextText}`);

          if (tickTone !== "silent" && currentChar && currentChar.trim()) {
            playTypeTick(tickTone);
          }

          index += 1;

          if (index <= text.length) {
            const delay = currentChar === "." || currentChar === "\n" ? 90 : 24;
            typingTimer = window.setTimeout(tick, delay);
            return;
          }

          renderMessage(`${prefix}${text}`);
          afterTyping();
        };

        tick();
      }

      function typePlainText({ target, text, afterTyping }) {
        let index = 1;

        const tick = () => {
          target.textContent = text.slice(0, index);
          index += 1;

          if (index <= text.length) {
            typingTimer = window.setTimeout(tick, 26);
            return;
          }

          afterTyping();
        };

        tick();
      }

      function eraseText({ prefix, text, afterErasing }) {
        let index = text.length;

        const tick = () => {
          renderMessage(`${prefix}${text.slice(0, index)}`);
          index -= 1;

          if (index >= 0) {
            typingTimer = window.setTimeout(tick, 12);
            return;
          }

          afterErasing();
        };

        tick();
      }

      function renderMessage(text, { showCursor = true } = {}) {
        message.textContent = "";
        message.append(document.createTextNode(text));

        if (!showCursor) {
          message.scrollTop = message.scrollHeight;
          return;
        }

        const cursor = document.createElement("span");
        cursor.className = "cursor";
        cursor.setAttribute("aria-hidden", "true");
        message.append(cursor);
        message.scrollTop = message.scrollHeight;
      }

      function playDoubleBeep(tone = "normal") {
        const AudioContext = window.AudioContext || window.webkitAudioContext;

        if (!AudioContext) {
          return;
        }

        audioContext ||= new AudioContext();

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        const start = audioContext.currentTime;
        const frequency = tone === "low" ? 680 : 1760;

        playBeep(start, 0.055, frequency);
        playBeep(start + 0.11, 0.065, frequency);
      }

      function playBeep(start, duration, frequency) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(frequency, start);
        oscillator.frequency.exponentialRampToValueAtTime(frequency * 0.92, start + duration);

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.08, start + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(start);
        oscillator.stop(start + duration + 0.015);
      }

      function playTypeTick(tone = "normal") {
        if (!audioContext) {
          return;
        }

        const start = audioContext.currentTime;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();

        oscillator.type = "square";
        const baseFrequency = tone === "low" ? 760 : 2100;
        const drift = tone === "low" ? 60 : 140;

        oscillator.frequency.setValueAtTime(baseFrequency + Math.random() * drift, start);

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(tone === "low" ? 720 : 1800, start);
        filter.Q.setValueAtTime(8, start);

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(tone === "low" ? 0.024 : 0.018, start + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.018);

        oscillator.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(start);
        oscillator.stop(start + 0.022);
      }

      function wrapTextForScreen(text) {
        const computed = window.getComputedStyle(message);
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        const maxWidth = message.clientWidth - 2;

        context.font = `${computed.fontWeight} ${computed.fontSize} ${computed.fontFamily}`;

        return text
          .split("\n")
          .map((line) => wrapLine(line.toUpperCase(), maxWidth, context))
          .join("\n");
      }

      function wrapLine(line, maxWidth, context) {
        if (!line.trim()) {
          return "";
        }

        const words = line.split(" ");
        const wrapped = [];
        let currentLine = "";

        words.forEach((word) => {
          const candidate = currentLine ? `${currentLine} ${word}` : word;

          if (context.measureText(candidate).width <= maxWidth) {
            currentLine = candidate;
            return;
          }

          if (currentLine) {
            wrapped.push(currentLine);
            currentLine = "";
          }

          if (context.measureText(word).width <= maxWidth) {
            currentLine = word;
            return;
          }

          const pieces = splitLongWord(word, maxWidth, context);
          wrapped.push(...pieces.slice(0, -1));
          currentLine = pieces.at(-1) || "";
        });

        if (currentLine) {
          wrapped.push(currentLine);
        }

        return wrapped.join("\n");
      }

      function splitLongWord(word, maxWidth, context) {
        const pieces = [];
        let piece = "";

        Array.from(word).forEach((character) => {
          const candidate = piece + character;

          if (!piece || context.measureText(candidate).width <= maxWidth) {
            piece = candidate;
            return;
          }

          pieces.push(piece);
          piece = character;
        });

        if (piece) {
          pieces.push(piece);
        }

        return pieces;
      }
    </script>
